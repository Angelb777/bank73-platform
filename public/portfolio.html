<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Portfolio — Bank73</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="/css/base.css" rel="stylesheet" />
  <link href="/css/theme.css" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/assets/TrustForBanksSimbol.png" />

  <style>
    /* FAB y modal */
    .fab {
      position: fixed; right: 24px; bottom: 24px;
      width: 56px; height: 56px; border-radius: 50%;
      background: #0d6efd; color: white; font-size: 28px;
      display: flex; align-items: center; justify-content: center;
      border: none; box-shadow: 0 6px 16px rgba(0,0,0,0.2);
      cursor: pointer;
      z-index: 60;
    }
    .fab:hover { filter: brightness(0.95); }

    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center; justify-content: center;
      z-index: 50;
    }
    .modal-backdrop.show { display: flex; }

    .modal {
      position: relative;
      background: #fff; color:#000;
      border-radius: 10px;
      width: 100%;
      max-width: 760px;
      padding: 20px;
    }
    .modal.create-modal {
      max-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0;
    }
    .create-modal-body {
      overflow: auto;
      padding: 28px 28px 18px;
      min-height: 0;
    }
    .create-modal-actions {
      position: sticky;
      bottom: 0;
      margin-top: 0;
      padding: 14px 28px;
      border-top: 1px solid #e5e7eb;
      background: rgba(255,255,255,.96);
      box-shadow: 0 -10px 24px rgba(15,23,42,.08);
      z-index: 2;
    }
    .modal .row {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      margin-top: 12px;
    }
    .modal h3 { margin-top: 0; }
    .modal input, .modal textarea, .modal select { border: 1px solid #ccc; background: #fff; color: #000; }
    .modal-close {
      position:absolute;
      top:14px;
      right:14px;
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid #d1d5db;
      background:#f8fafc;
      color:#0f172a;
      font-size:22px;
      line-height:1;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      }
    .modal-close:hover { background:#e5e7eb; }
    #cancelCreate {
      color:#1f2937;
      background:#e5e7eb;
      border:1px solid #cbd5e1;
      box-shadow:none;
    }
    #cancelCreate:hover { background:#d1d5db; }

    .muted { opacity:.7; font-size:.9rem; }
    #noProjectsBanner { margin:20px 0; text-align:center; display:none; }

    /* =========================
       TOPBAR: izquierda/centro/derecha
       ========================= */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    /* Izquierda fija */
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 0 0 auto;
      min-width: 140px; /* para que no baile */
    }

    /* Centro ocupa y centra */
    .topbar-center {
      flex: 1 1 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 240px;
    }

    /* Derecha fija */
    .topbar-right {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-width: 140px; /* para equilibrar y ayudar al centrado */
      gap: 10px;
    }

    .filter-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(235,245,255,0.92);
      font-size: 0;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease;
    }

    .filter-button:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.24);
    }

    .filter-icon {
      width: 22px;
      height: 22px;
      display: block;
      fill: currentColor;
      transition: transform .12s ease;
    }

    .filter-button:hover .filter-icon {
      transform: scale(1.12);
    }

    .filter-modal .modal {
      max-width: 520px;
      padding: 20px;
    }

    .filter-modal h3 {
      margin-bottom: 12px;
    }

    .filter-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .filter-grid label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
    }

    .filter-grid select,
    .filter-grid input {
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      padding: 10px 12px;
      background: #fff;
      color: #0f172a;
      font-size: 14px;
    }

    .filter-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    @media (max-width: 720px) {
      .topbar {
        flex-wrap: nowrap;
        padding: 8px 12px;
        align-items: center;
      }
      .topbar-left, .topbar-right {
        min-width: 40px;
        flex: 0 0 auto;
      }
      .topbar-left { order: 1; }
      .topbar-center { order: 2; flex: 1 1 auto; min-width: 0; display:flex; justify-content:center; align-items:center; padding:6px 0; }
      .topbar-right { order: 3; }
      .brand { display: none; }
      .topbar-search { width: 100%; max-width: calc(100% - 130px); min-width: 0; height:36px; padding:0 10px; }
      .topbar-right .btn { height: 36px; padding: 0 12px; font-size: 13px; display: inline-flex; align-items: center; }
      .filter-modal .modal {
        max-width: calc(100vw - 32px);
      }
      .filter-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Buscador minimal negro */
    .topbar-search{
  width: min(520px, 60vw);
  height: 40px;
  padding: 0 16px;
  border-radius: 999px;

  /* ✅ integrado: azul oscuro MUY sutil (no cantoso) */
  background: rgba(255,255,255,0.04);

  /* borde fino tipo “hairline” */
  border: 1px solid rgba(255,255,255,0.08);

  /* un pelín de blur sin pasarse */
  backdrop-filter: blur(4px);

  color: rgba(235,245,255,0.92);
  outline: none;
  font-size: 14px;
  letter-spacing: .2px;

  transition: background .15s ease, border-color .15s ease, box-shadow .15s ease;
}

.topbar-search::placeholder{
  color: rgba(200,220,255,.38);
}

.topbar-search:focus{
  background: rgba(255,255,255,0.06);
  border-color: rgba(140,180,255,0.18);
  box-shadow: 0 0 0 2px rgba(90,140,255,0.10);
}

    @media (max-width: 720px) {
      .topbar-left, .topbar-right { min-width: 40px; flex: 0 0 auto; }
      .topbar-search { width: 100%; max-width: calc(100% - 130px); min-width: 0; height:36px; padding:0 10px; }
    }

    /* =========================
       ASIGNEES GRID (modal)
       ========================= */
    .assignees-grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    @media (max-width: 720px) {
      .assignees-grid { grid-template-columns: 1fr; }
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      opacity: .65;
    }

    .required-badge{
      display:inline-block;
      margin-left: 8px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(13,110,253,.12);
      color: #0d6efd;
      border: 1px solid rgba(13,110,253,.25);
      vertical-align: middle;
    }

    .team-suggestion {
      margin-top: 12px;
      padding: 14px;
      border: 1px solid rgba(15, 23, 42, .16);
      border-radius: 10px;
      background: #f8fafc;
    }
    .team-suggestion-head {
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:10px;
    }
    .team-suggestion-head strong { display:block; }
    .team-suggestion-grid {
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:10px;
    }
    .team-suggestion label {
      display:flex;
      flex-direction:column;
      gap:5px;
      font-size:12px;
      color:#334155;
    }
    .team-suggestion input,
    .team-suggestion textarea {
      width:100%;
      border-radius:8px;
      padding:9px 10px;
    }
    @media (max-width: 720px) {
      .team-suggestion-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="brand">Portfolio</div>
    </div>

    <div class="topbar-center">
      <!-- ✅ 1 SOLO buscador -->
      <input
        id="portfolioSearch"
        class="topbar-search"
        type="search"
        placeholder="Buscar proyecto..."
        autocomplete="off"
      />
    </div>

    <div class="topbar-right">
      <button id="portfolioFilterBtn" class="filter-button" type="button" title="Abrir filtros" aria-label="Abrir filtros">
        <svg viewBox="0 0 24 24" class="filter-icon" aria-hidden="true">
          <path d="M3 4h18l-6 8.4V19l-6 3v-7.6L3 4z" />
        </svg>
      </button>
      <button id="logoutBtn" class="btn">Salir</button>
    </div>
  </div>

  <!-- MODAL FILTROS -->
  <div class="modal-backdrop" id="filterModalBackdrop">
    <div class="modal create-modal filter-modal">
      <button id="closeFilterModal" class="modal-close" type="button" aria-label="Cerrar">×</button>
      <div class="create-modal-body">
        <h3>Filtrar proyectos</h3>
        <div class="filter-grid">
          <label>
            Promotor
            <select id="filterPromoter">
              <option value="">Todos los promotores</option>
            </select>
          </label>

          <label>
            Estado del proyecto
            <select id="filterStatus">
              <option value="">Todos los estados</option>
              <option value="EN_CURSO">EN_CURSO</option>
              <option value="EN_MARCHA">EN_MARCHA</option>
              <option value="PAUSADO">PAUSADO</option>
              <option value="FINALIZADO">FINALIZADO</option>
            </select>
          </label>

          <label>
            Ordenar por
            <select id="filterSort">
              <option value="updatedAt_desc">Última edición</option>
              <option value="updatedAt_asc">Más antiguo</option>
              <option value="createdAt_desc">Creación reciente</option>
              <option value="createdAt_asc">Creación antigua</option>
              <option value="name_asc">Nombre A-Z</option>
              <option value="name_desc">Nombre Z-A</option>
            </select>
          </label>

          <label>
            Solo con unidades vendidas
            <input id="filterSoldOnly" type="checkbox" />
          </label>
        </div>
      </div>
      <div class="row create-modal-actions filter-actions">
        <button id="clearFilters" class="btn ghost" type="button">Limpiar</button>
        <button id="applyFilters" class="btn" type="button">Aplicar</button>
      </div>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="container">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
      <h2>Proyectos</h2>
    </div>

    <div id="noProjectsBanner" class="muted">
      No tienes proyectos asignados o aprobados todavía.
    </div>

    <div id="cards" class="grid"></div>
  </div>

  <!-- FAB empieza oculto, lo muestra JS solo a admin/bank -->
  <button class="fab" id="fabPlus" title="Crear proyecto" style="display:none">+</button>

  <!-- MODAL -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal create-modal">
      <button id="closeCreateModal" class="modal-close" type="button" aria-label="Cerrar">×</button>
      <div class="create-modal-body">
      <h3>Crear nuevo proyecto</h3>

      <div class="row" style="justify-content:flex-start; gap:12px; flex-wrap: wrap;">
        <input id="pName" type="text" placeholder="Nombre del proyecto" style="flex: 1 1 240px;" />
        <select id="pStatus" style="flex:0 0 180px;">
          <option value="EN_CURSO">EN_CURSO</option>
          <option value="EN_MARCHA">EN_MARCHA</option>
          <option value="PAUSADO">PAUSADO</option>
          <option value="FINALIZADO">FINALIZADO</option>
        </select>
        <textarea id="pDesc" rows="3" placeholder="Descripción" style="width:100%;"></textarea>
      </div>

      <div id="createAssigneesSection" style="display:none; margin-top:12px;">
        <div class="small muted">
          Asignaciones
        </div>

        <!-- ✅ aquí el JS pintará TODOS los roles con buscador + select -->
        <div id="assigneesContainer" class="assignees-grid"></div>

        <div class="hint">
          Tip: Escribe en el buscador de cada rol para filtrar.
        </div>

        <!-- legacy oculto (por si el backend/JS viejo lo buscaba) -->
        <div style="display:none">
          <select id="pPromoters" multiple size="6" style="width:100%;"></select>
          <select id="pCommercials" multiple size="6" style="width:100%;"></select>
        </div>
      </div>

      <div class="team-suggestion">
        <div class="team-suggestion-head">
          <div>
            <strong>Equipo sugerido</strong>
            <div class="muted">Opcional. Escribe uno o varios nombres por rol, separados por coma.</div>
          </div>
        </div>
        <div class="team-suggestion-grid">
          <label>Promotor<input id="ts-promoter" type="text" placeholder="Ej: Juan Perez, Maria Lopez" /></label>
          <label>Comercial<input id="ts-commercial" type="text" placeholder="Ej: Estíbaliz Sánchez" /></label>
          <label>Legal<input id="ts-legal" type="text" placeholder="Ej: Equipo legal banco X" /></label>
          <label>Técnico<input id="ts-tecnico" type="text" placeholder="Ej: Supervisor obra" /></label>
          <label>Gerencia<input id="ts-gerencia" type="text" placeholder="Ej: Gerencia regional" /></label>
          <label>Socios<input id="ts-socios" type="text" placeholder="Ej: Socio responsable" /></label>
          <label>Financiero<input id="ts-financiero" type="text" placeholder="Ej: Analista financiero" /></label>
          <label>Contable<input id="ts-contable" type="text" placeholder="Ej: Contabilidad" /></label>
        </div>
        <label style="margin-top:10px;">Notas para el admin
          <textarea id="ts-notes" rows="3" placeholder="Cualquier comentario adicional sobre el equipo o la asignación."></textarea>
        </label>
      </div>

      </div>

      <div class="row create-modal-actions">
        <button id="cancelCreate" class="btn ghost">Cancelar</button>
        <button id="createProject" class="btn">Crear</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/portfolio.js?v=privacy-create"></script>
</body>
</html>
